# Server-side compose file: pulls the prebuilt image from ghcr.io instead of
# building from source, so the server doesn't need the repo cloned.
#
# Copy this to the server as docker-compose.yml alongside:
#   .env                       (MC_DATA_DIR, DOMAIN, AUTH_PASSWORD_HASH,
#                               SESSION_SECRET, and any optional overrides)
#   Caddyfile
#   config/rules.custom.json
#
# Deploy / update:
#   docker compose pull && docker compose up -d

services:
  open-log:
    image: ghcr.io/drewbi/open-log:latest
    restart: unless-stopped
    environment:
      MC_LOGS_DIR: /app/mc-logs
      DB_PATH: /app/data/open-log.db
      PORT: "4000"
      SERVER_TZ_OFFSET_HOURS: ${SERVER_TZ_OFFSET_HOURS:-0}
      # Bind-mounted host log folders (especially under Docker Desktop) don't
      # always deliver native inotify events reliably; polling is the safe
      # default. Set to "false" if you've confirmed native events work (e.g.
      # native Linux Docker Engine) to cut the small polling CPU overhead.
      WATCH_USE_POLLING: ${WATCH_USE_POLLING:-true}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      # Read-only: this app must never be able to modify the live server logs.
      - ${MC_DATA_DIR}/logs:/app/mc-logs:ro
      - open-log-data:/app/data
      # Optional: add mod-specific patterns without rebuilding the image.
      - ./config/rules.custom.json:/app/config/rules.custom.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No "ports:" here on purpose — only Caddy is reachable from outside the
    # docker network; the app port itself stays internal.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - open-log

volumes:
  open-log-data:
  caddy-data:
  caddy-config:
